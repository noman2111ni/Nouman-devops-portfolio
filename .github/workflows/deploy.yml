name: 🚀 Deploy Portfolio to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install Dependencies
        working-directory: nouman-portfolio
        run: npm install

      - name: 🏗️ Build Project
        working-directory: nouman-portfolio
        run: npm run build
        env:
          CI: false

      - name: 🚀 Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "🔄 Starting deployment..."

            # Repo clone ya pull
            if [ -d "/home/ec2-user/portfolio" ]; then
              echo "📂 Repo exists — pulling latest..."
              cd /home/ec2-user/portfolio
              git pull origin main
            else
              echo "📥 Cloning repo..."
              git clone https://github.com/noman2111ni/Nouman-devops-portfolio.git /home/ec2-user/portfolio
            fi

            # Sahi folder mein jao
            cd /home/ec2-user/portfolio/nouman-portfolio

            # Dependencies install
            echo "📦 Installing dependencies..."
            npm install

            # Build
            echo "🏗️ Building project..."
            CI=false npm run build

            # Nginx mein copy
            echo "📤 Copying to Nginx..."
            sudo rm -rf /usr/share/nginx/html/*
            sudo cp -r build/* /usr/share/nginx/html/

            # Nginx restart
            echo "🔄 Restarting Nginx..."
            sudo systemctl restart nginx

            echo "✅ Deployment complete!"